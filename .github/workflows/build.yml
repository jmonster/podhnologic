name: Build and Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Go and Web Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download Go dependencies
        run: go mod download

      - name: Verify Go dependencies
        run: go mod verify

      - name: Run Go tests
        run: go test -v ./...

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build web app
        run: |
          corepack enable
          cd web
          pnpm install --frozen-lockfile
          pnpm build

  linked-build:
    name: Linked build ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-latest
          - target: darwin-amd64
            runner: macos-latest
          - target: linux-amd64
            runner: ubuntu-latest
          - target: linux-arm64
            runner: ubuntu-latest
          - target: windows-amd64
            runner: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Linux toolchains
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            build-essential \
            curl \
            gcc-aarch64-linux-gnu \
            gcc-mingw-w64-x86-64 \
            libtool \
            make \
            pkg-config \
            xz-utils

      - name: Install macOS build tools
        if: runner.os == 'macOS'
        run: |
          if ! command -v pkg-config >/dev/null 2>&1; then
            brew install pkg-config
          fi

      - name: Build linked binary
        run: ./scripts/build-linked.sh "${{ matrix.target }}"

      - name: Verify binary exists
        run: |
          suffix=""
          if [[ "${{ matrix.target }}" == windows-* ]]; then
            suffix=".exe"
          fi
          test -s "build/podhnologic-${{ matrix.target }}${suffix}"
